<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Measuring Resolution Time</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">

    <style>
        /* Animated Gradient Background */
        body {
            margin: 0;
            color: white;
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            overflow-x: hidden;

            background: linear-gradient(135deg, #271a2e 0%, #16213e 100%);
        }

        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }


        /* Floating Particles */
        .particles {
            position: fixed;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            z-index: 0;
            overflow: hidden;
        }

        .particle {
            position: absolute;
            background: rgba(127, 255, 212, 0.6);
            border-radius: 50%;
            opacity: 0.7;
            animation: floatUp linear infinite;
        }

        @keyframes floatUp {
            from {
                transform: translateY(100vh);
                opacity: 0;
            }
            to {
                transform: translateY(-10vh);
                opacity: 1;
            }
        }


        /* Navbar */
        .navbar {
            background: #1A1A2E;
            z-index: 2;
        }

        .nav-link {
            transition: all 0.3s ease;
            font-size: 1rem;
            font-weight: 400;
        }

        .nav-link:hover {
            color: #00ffcc !important;
            text-shadow: 0 0 8px rgba(0,255,204,0.8);
        }

        .navbar-brand {
            font-size: 1.1rem;
            font-weight: 600;
        }

        .navbar,
        .navbar-brand,
        .nav-link {
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        }

        /* ===== Content Layer ===== */
        .container {
            position: relative;
            z-index: 2;
        }


        /* Glowy Title */
        .glow-title {
            font-size: 4rem;
            font-weight: 700;
            color: #4cc9f0;
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            text-shadow: 0 0 8px rgba(76, 201, 240, 0.3); /* subtle, not neon */
            transition: transform 0.2s ease, text-shadow 0.2s ease;
        }

        .glow-title:hover {
            transform: scale(1.02);
            text-shadow: 0 0 16px rgba(76, 201, 240, 0.5);
        }


        /* Buttons */
        .btn-glow {
            padding: 15px 40px;
            font-size: 1.2rem;
            background-color: #59D48C;
            color: #1a1a2e;
            border: none;
            border-radius: 50px;
            font-weight: bold;
            transition: transform 0.15s ease, background-color 0.15s ease;
        }

        .btn-glow:hover {
            background-color: #3bb8e0;
            transform: translateY(-2px);
        }


        /* Text polish */
        p {
            color: #cbd5e0;
            font-size: 1.2rem;
        }

        p:hover {
            opacity: 0.85;
        }


        /* Footer */
        .footer {
            position: fixed;
            bottom: 15px;
            width: 100%;
            text-align: center;
            font-size: 0.8rem;
            color: #94a3b8;
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            z-index: 2;
        }
    </style>
</head>


<body>
<!-- Floating Particles Container -->
<div class="particles" id="particles"></div>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg px-4">
    <a class="navbar-brand text-white" href="/">Measuring Resolution Time ⌨</a>
    <div class="collapse navbar-collapse">
        <ul class="navbar-nav ms-auto">
            <li class="nav-item"><a class="nav-link text-white" href="/">Home</a></li>
            <li class="nav-item"><a class="nav-link text-white" href="/calculator/">Calculator</a></li>
            <li class="nav-item"><a class="nav-link text-white" href="/about/">About</a></li>
        </ul>
    </div>
</nav>

<!-- Page Content -->
<div class="container mt-5">
    {% block content %}{% endblock %}
</div>

<!-- Footer -->
<footer class="footer">
    Developed by Hennysa Omoregie
</footer>

<!-- Bootstrap -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<!-- Particle Generator Script -->
<script>
    const particleContainer = document.getElementById("particles");

    function createParticle() {
        const particle = document.createElement("div");
        particle.classList.add("particle");

        const size = Math.random() * 4 + 2; // 2px–6px
        particle.style.width = size + "px";
        particle.style.height = size + "px";

        particle.style.left = Math.random() * 100 + "vw";
        particle.style.animationDuration = (Math.random() * 10 + 8) + "s";
        particle.style.opacity = Math.random();

        particleContainer.appendChild(particle);

        setTimeout(() => {
            particle.remove();
        }, 18000);
    }

    setInterval(createParticle, 200);
</script>
</body>
</html>
